server:
  port: 8080

spring:
  application:
    name: ipos-backend

  datasource:
    url: jdbc:mysql://mysql:3306/ipos_db
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
